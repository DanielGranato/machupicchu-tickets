<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Machu Picchu</title>
</head>
<body>
    <header></header>
    <main>

        <section class="hero_section">
            <div class="hero_title">
                <h1>Come with us to Machu Picchu</h1>
            </div>
            <aside class="form">
                <form action="" method="get">

                    <h3 class="ticket">Buy your ticket</h3>

                    <label for="userName">Name</label>
                    <input type="text" name="userName" required>

                    <label for="age">Age</label>
                    <input type="number" name="age" min="12" max="100">

                    <button type="submit">send</button>
                </form>
            </aside>

            <div class="hero_content">
                <div class="hero_card">

                    <div class="info">
                        <h3>Location</h3>
                        <p class="text">210 km from the city of Cusco-Valle del Ururbamba</p>
                    </div>

                    <div class="info">
                        <h3>Height</h3>
                        <p class="text">2,430 m.s.n.m</p>
                    </div>

                    <a href="http://google.com/maps/place/machu+picchu/data=!4m2!3m1!1s0x916d9a5f89555555:0x3a10370ea4a01a27?sa=X&ved=1t:155783&ictx=111" target="_blank" class="button">ver mapa</a>
                </div>
                
            </div>
        </section>

        <section class="section2">
            <h2>under development</h2>
        </section>

    </main>
    <footer></footer>
    
</body>
</html>
